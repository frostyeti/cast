name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup mise
        uses: jdx/mise-action@v4

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Add mise tool shims to PATH
        run: |
          echo "$(dirname "$(mise which deno)")" >> "$GITHUB_PATH"
          echo "$(dirname "$(mise which bun)")" >> "$GITHUB_PATH"

      - name: Setup environment
        run: |
          go mod download
          go mod tidy

      - name: Build
        run: go build ./...

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4

      - name: Run Unit Tests
        run: go test -v ./...

      - name: Run Integration Tests
        run: go test -tags=integration -v ./...

      - name: Run E2E Tests
        run: go test -v ./test/e2e/...

      # - name: Upload Code Coverage
      #   uses: codecov/codecov-action@v4
      #   with:
      #     file: ./coverage.txt
      #     fail_ci_if_error: true
